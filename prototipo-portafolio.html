<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Prototipo de portafolio · Fase A2 · Diego Maury</title>
<!--
  PROTOTIPO AISLADO — Fase A2 del Sistema de Portafolio.
  - NO es LIVE: noindex,nofollow y sin analítica (ni GTM ni Clarity).
  - No está enlazado desde ninguna página ni desde el sitemap.
  - No toca assets/css/styles.css ni assets/js/main.js.
  - Diseño importado del proyecto de Claude Design "Portafolio Prototipo".
  - Datos: SSOT - Portafolio Proyectos (Notion). No inventar cifras ni artefactos.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0A0612;
    --bg-2:   #1A1128;
    --border: #2A1F3D;
    --t1:     #FAF8FC;
    --t2:     #9A8CB0;
    --t3:     #8B7C9E;
    --t-body: #DDDBE0;
    --ember:  #FF5C39;
    --sans:   'Plus Jakarta Sans', system-ui, sans-serif;
    --mono:   'DM Mono', ui-monospace, monospace;
    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --wrap:   1160px;
    --wrap-narrow: 900px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--t1);
    font-family: var(--sans); line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  a { color: var(--ember); }
  ::selection { background: var(--ember); color: var(--bg); }
  :focus-visible { outline: 2px solid var(--ember); outline-offset: 3px; border-radius: 4px; }

  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 32px; }
  .wrap-narrow { max-width: var(--wrap-narrow); margin: 0 auto; padding: 0 32px; }
  .band { border-bottom: 1px solid var(--border); }
  .band--raised { background: var(--bg-2); }

  .eyebrow {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ember);
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--ember); }
  .eyebrow--plain { color: var(--t3); letter-spacing: 0.16em; font-size: 9px; }
  .eyebrow--plain::before { display: none; }
  .label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ember);
  }
  .meta {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--t3);
  }

  /* ── NAV ── */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,6,18,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav__inner { height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .nav__brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--t1); font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .nav__mark { width: 22px; height: 22px; background: var(--ember); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); }
  .nav__right { display: flex; align-items: center; gap: 16px; }
  .nav__back { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t2); text-decoration: none; }
  .nav__back:hover { color: var(--t1); }
  .nav__badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--t3); border: 1px solid var(--border); padding: 5px 10px; border-radius: 5px; }

  /* ── HERO ── */
  .hero { padding: 88px 0 64px; }
  .hero h1 {
    font-size: clamp(1.9rem, 4vw, 3.2rem); font-weight: 300;
    letter-spacing: -0.02em; line-height: 1.18; max-width: 22ch;
    margin-top: 26px;
  }
  .hero p { margin-top: 24px; font-size: 15px; color: var(--t2); max-width: 58ch; line-height: 1.7; }

  /* ── CONTADOR DE EVIDENCIA (firma) ── */
  .counter { padding: 64px 0; }
  .counter__grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-top: 20px;
  }
  .counter__cell { background: var(--bg); padding: 28px 26px; }
  .counter__num {
    font-size: clamp(2rem, 3.4vw, 3rem); letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums; color: var(--t1);
  }
  .counter__num--total { font-weight: 800; }
  .counter__num--ok    { font-weight: 700; }
  .counter__num--no    { font-weight: 400; color: var(--t3); }
  .counter__cap { font-size: 13px; color: var(--t2); margin-top: 6px; }
  .counter__note { margin-top: 18px; font-size: 12.5px; color: var(--t3); max-width: 60ch; line-height: 1.6; }

  /* ── BARRA DE PRUEBA ── */
  .trust { padding: 40px 0; }
  .trust__row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px; }
  .trust__chip {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--t2);
    border: 1px solid var(--border); border-radius: 7px; padding: 11px 18px;
    background: rgba(250,248,252,0.02);
  }

  /* ── GALERIA INSIGNIA ── */
  .gallery { padding: 72px 0; }
  .gallery h2 {
    font-size: clamp(1.4rem, 2.4vw, 2rem); font-weight: 800;
    letter-spacing: -0.025em; margin: 14px 0 44px; max-width: 44ch;
  }
  .card {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
    background: var(--bg-2); transition: border-color 200ms var(--ease);
  }
  .card:hover, .card:focus-visible { border-color: var(--ember); }
  .card--featured { margin-bottom: 20px; }
  .card--featured .card__split { display: grid; grid-template-columns: 1.3fr 1fr; }
  .card__body { padding: 40px; border-right: 1px solid var(--border); }
  .card__side { padding: 40px; }
  .card__title {
    font-size: clamp(1.3rem, 2vw, 1.7rem); font-weight: 700; line-height: 1.25;
    letter-spacing: -0.015em; color: var(--t1); margin: 18px 0;
  }
  .card__caps { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
  .cap {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--t3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px;
  }
  .card__scale { font-size: 12.5px; color: var(--t3); }
  .card__metric { font-size: 15px; color: var(--t1); line-height: 1.5; margin: 10px 0 16px; }
  .tally {
    display: flex; align-items: baseline; gap: 14px;
    padding-top: 16px; border-top: 1px solid var(--border);
    font-family: var(--mono);
  }
  .tally__ok { font-size: 15px; font-weight: 600; color: var(--t1); }
  .tally__no { font-size: 15px; color: var(--t3); }
  .tally__cta { margin-left: auto; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ember); }

  .gallery__rest { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card--small { display: flex; flex-direction: column; padding: 26px 24px; border-radius: 12px; }
  .card--small .card__title { font-size: 15px; margin: 14px 0; flex: 1; }
  .card--small .card__metric { font-size: 12.5px; color: var(--t2); margin: 0 0 16px; }
  .card--small .tally { padding-top: 14px; }
  .card--small .tally__ok { font-size: 13px; }
  .card--small .tally__no { font-size: 13px; }

  /* ── MEDIA DE CASO ── */
  .card__media {
    position: relative; overflow: hidden; background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .card__media img {
    display: block; width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(1) contrast(1.05) brightness(0.62);
    transition: filter 320ms var(--ease), transform 320ms var(--ease);
  }
  .card:hover .card__media img, .card:focus-visible .card__media img {
    filter: grayscale(0.35) contrast(1) brightness(0.8);
    transform: scale(1.02);
  }
  .card__media::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,6,18,0.1) 0%, rgba(10,6,18,0.72) 100%);
    pointer-events: none;
  }
  .card--featured .card__media { height: 100%; min-height: 260px; border-bottom: none; border-right: 1px solid var(--border); }
  .card--small .card__media { height: 132px; margin: -26px -24px 18px; border-radius: 12px 12px 0 0; }
  .card__media img.card__logo {
    position: absolute; left: 20px; bottom: 16px; z-index: 2;
    width: 44px; height: 44px; border-radius: 8px; object-fit: contain;
    background: rgba(10,6,18,0.82); border: 1px solid var(--border); padding: 4px;
    filter: none; transform: none;
  }
  .card:hover .card__media img.card__logo,
  .card:focus-visible .card__media img.card__logo { filter: none; transform: none; }
  .card--featured .card__split { grid-template-columns: 0.85fr 1.1fr 0.9fr; }

  /* Caso sin imagen: el hueco es el mensaje */
  .media-void {
    display: flex; flex-direction: column; gap: 6px;
    align-items: center; justify-content: center; text-align: center;
    background: repeating-linear-gradient(135deg, transparent 0 8px, rgba(139,124,158,0.05) 8px 9px);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--t3); padding: 16px;
  }
  .media-void__hint { color: var(--ember); opacity: 0.55; font-size: 8px; }
  .card--small .media-void { height: 132px; margin: -26px -24px 18px; border-radius: 12px 12px 0 0; }
  .card--featured .media-void { min-height: 260px; border-bottom: none; border-right: 1px solid var(--border); }

  /* Hero del caso */
  .case-hero { position: relative; height: clamp(200px, 28vw, 320px); overflow: hidden; border-bottom: 1px solid var(--border); }
  .case-hero img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.5) contrast(1.05); }
  .case-hero::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,6,18,0.35) 0%, rgba(10,6,18,0.95) 100%);
  }
  .case-hero img.case-hero__logo {
    position: absolute; z-index: 2; left: 50%; transform: translateX(-50%); bottom: 22px;
    width: 60px; height: 60px; object-fit: contain; border-radius: 10px;
    background: rgba(10,6,18,0.85); border: 1px solid var(--border); padding: 6px;
    filter: none;
  }

  /* ── EVIDENCIA: miniatura del artefacto ── */
  .evidence__thumb {
    display: block; margin-top: 10px; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; background: var(--bg-2);
    transition: border-color 200ms var(--ease);
  }
  .evidence__thumb:hover { border-color: var(--ember); }
  .evidence__thumb img {
    display: block; width: 100%; height: 92px; object-fit: cover; object-position: top center;
    filter: contrast(1.02);
  }
  .evidence__thumb figcaption {
    font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--t3); padding: 6px 8px; border-top: 1px solid var(--border);
  }

  /* ── SOPORTE ── */
  .support { padding: 64px 0; }
  .support h2 { font-size: 1.2rem; font-weight: 700; margin: 8px 0 28px; letter-spacing: -0.01em; }
  .support__list { border-top: 1px solid var(--border); }
  .support__row {
    display: grid; grid-template-columns: 1.4fr 2fr 1.2fr; gap: 20px;
    padding: 16px 4px; border-bottom: 1px solid var(--border); align-items: baseline;
  }
  .support__title { font-size: 13.5px; font-weight: 600; color: var(--t1); }
  .support__result { font-size: 12.5px; color: var(--t2); line-height: 1.5; }
  .support__ev { font-family: var(--mono); font-size: 10.5px; color: var(--t3); text-align: right; line-height: 1.5; }

  /* ── ARCHIVO ── */
  .archive { padding: 56px 0 100px; }
  .archive__toggle {
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    background: none; border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px;
    color: var(--t1); font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: border-color 200ms var(--ease);
  }
  .archive__toggle:hover { border-color: var(--ember); }
  .archive__glyph { color: var(--t3); }
  .archive__note { margin-top: 12px; font-size: 12px; color: var(--t3); max-width: 60ch; }
  .archive__grid {
    margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .archive__cell { background: var(--bg); padding: 16px 18px; }
  .archive__cell strong { display: block; font-size: 12.5px; font-weight: 600; color: var(--t-body); }
  .archive__cell span { font-family: var(--mono); font-size: 9px; color: var(--t3); letter-spacing: 0.04em; display: block; margin-top: 5px; }
  [hidden] { display: none !important; }

  /* ── CASO ── */
  .case-head { padding: 72px 0 48px; }
  .case-head h1 {
    font-size: clamp(1.7rem, 3.4vw, 2.6rem); font-weight: 300;
    letter-spacing: -0.02em; line-height: 1.2; margin: 16px 0 20px;
  }
  .case-head__tally { display: flex; align-items: baseline; gap: 16px; font-family: var(--mono); flex-wrap: wrap; }
  .case-head__tally .tally__ok, .case-head__tally .tally__no { font-size: 17px; }

  .case-two { padding: 56px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .case-two p { font-size: 14px; color: var(--t2); line-height: 1.7; margin-top: 12px; }

  .resp { padding: 56px 0; }
  .resp h2 { font-size: 1.3rem; font-weight: 700; margin: 8px 0 32px; }
  .resp__grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .resp__col { background: var(--bg); padding: 28px 26px; }
  .resp__head {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .resp__head--era { color: var(--t1); }
  .resp__head--no  { color: var(--t3); }
  .resp__item { display: flex; gap: 10px; font-size: 13px; line-height: 1.55; margin-bottom: 12px; }
  .resp__item--era { color: var(--t-body); }
  .resp__item--no  { color: var(--t2); }
  .resp__item i { font-style: normal; flex-shrink: 0; }
  .resp__item--era i { color: var(--t1); }
  .resp__item--no i  { color: var(--t3); }

  .system { padding: 56px 0; }
  .system__item {
    display: flex; gap: 14px; padding-bottom: 14px; margin-top: 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px; color: var(--t-body); line-height: 1.6;
  }
  .system__item i { font-family: var(--mono); font-size: 11px; color: var(--t3); flex-shrink: 0; width: 16px; font-style: normal; }

  .tradeoffs { padding: 56px 0; }
  .prose { font-size: 14.5px; color: var(--t-body); line-height: 1.75; max-width: 70ch; margin-top: 16px; }

  .results { padding: 56px 0; }
  .results__grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 18px; }
  .results__cell {
    border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px;
    font-size: 13px; color: var(--t2); line-height: 1.55;
  }
  .results__cell strong { color: var(--t1); font-weight: 600; }

  /* ── EVIDENCIA (clímax) ── */
  .evidence { padding: 72px 0; }
  .evidence h2 { font-size: 1.4rem; font-weight: 700; margin: 14px 0 8px; letter-spacing: -0.015em; }
  .evidence__sub { font-size: 13px; color: var(--t3); margin-bottom: 32px; }
  .evidence__table { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .evidence__head, .evidence__row { display: grid; grid-template-columns: 2fr 0.9fr 1.6fr; gap: 12px; }
  .evidence__head {
    background: var(--bg-2); padding: 12px 20px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--t3);
  }
  .evidence__row { padding: 16px 20px; border-top: 1px solid var(--border); align-items: start; }
  .evidence__claim { font-size: 13px; color: var(--t-body); line-height: 1.5; }
  .evidence__artifact { font-size: 12px; color: var(--t2); line-height: 1.5; }
  .evidence__artifact a { text-decoration: none; border-bottom: 1px solid rgba(255,92,57,0.4); }
  .evidence__artifact a:hover { color: var(--t1); border-bottom-color: var(--t1); }
  .status { font-family: var(--mono); font-size: 13px; line-height: 1.4; }
  .status__glyph { font-weight: 600; }
  .status__grade { display: block; font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .status--inst .status__glyph { color: var(--t1); }
  .status--inst .status__grade { color: var(--t3); }
  .status--own  .status__glyph { color: var(--t2); }
  .status--own  .status__grade { color: var(--t3); }
  .status--none .status__glyph { color: var(--t3); }
  .status--none .status__grade { color: var(--t3); }

  .legend {
    margin-top: 20px; font-size: 12px; color: var(--t3); line-height: 1.7;
    border-left: 1px solid var(--border); padding-left: 16px; max-width: 68ch;
  }
  .legend b { color: var(--t2); font-weight: 500; }

  .autopsy { padding: 56px 0; }
  .case-archive { padding: 48px 0 96px; }
  .case-archive__row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .case-archive__chip { font-size: 12px; color: var(--t2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .wrap, .wrap-narrow { padding: 0 20px; }
    .counter__grid { grid-template-columns: 1fr; }
    .card--featured .card__split { grid-template-columns: 1fr; }
    .card__body { border-right: none; border-bottom: 1px solid var(--border); padding: 28px 24px; }
    .card__side { padding: 28px 24px; }
    .gallery__rest { grid-template-columns: 1fr; }
    .support__row { grid-template-columns: 1fr; gap: 6px; }
    .support__ev { text-align: left; }
    .archive__grid { grid-template-columns: 1fr; }
    .case-two { grid-template-columns: 1fr; gap: 32px; }
    .resp__grid { grid-template-columns: 1fr; }
    .results__grid { grid-template-columns: 1fr; }
    .evidence__head { display: none; }
    .evidence__row { grid-template-columns: 1fr; gap: 8px; padding: 20px; }
    .status { display: flex; align-items: baseline; gap: 8px; }
    .status__grade { display: inline; margin-top: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav__inner">
    <a class="nav__brand" href="#/" data-home>
      <span class="nav__mark" aria-hidden="true"></span>
      <span>Diego Maury</span>
    </a>
    <div class="nav__right">
      <a class="nav__back" href="#/" data-home hidden id="navBack">&larr; Portafolio</a>
      <span class="nav__badge">Prototipo · A2</span>
    </div>
  </div>
</nav>

<main id="app"></main>

<script>
/* ────────────────────────────────────────────────────────────────
   DATOS — fuente única de verdad: base Notion "SSOT - Portafolio
   Proyectos". Ninguna cifra ni artefacto se inventa aquí.
   Grados de evidencia:
     inst → un tercero lo publica (Informe del Tec, prensa, Talent Land)
     own  → documentación propia (playlists de Diego). Prueba que el
            evento ocurrió, no que la cifra sea correcta.
     none → sin artefacto. La fila se muestra igual, nunca se omite.
   ──────────────────────────────────────────────────────────────── */

const CASES = {
  heineken: {
    slug: 'heineken', org: 'HEINEKEN/FEMSA', year: '2019–2022', tipo: 'Programa de innovación',
    banner: 'assets/img/cases/heineken-banner.jpg', logo: 'assets/img/cases/heineken-logo.png',
    alt: 'Equipo del HEINEKEN Green Challenge durante una edición del programa',
    resultTitle: 'Escalé un programa nacional de sustentabilidad y multipliqué por 7 la participación del sureste',
    metric: '+600% de crecimiento en la participación del sureste (2019–2021). Línea base documentada: 35 propuestas.',
    capacities: ['Dirección de programas', 'Diseño de programas', 'Alianzas estratégicas', 'Escalamiento regional'],
    scale: '4 ediciones · 6 meses de operación cada una · alcance nacional',

  { title: 'HackSureste Industria 4.0', parent: 'HackSureste' },
  { title: 'HackSureste WIRE', parent: 'HackSureste' },
  { title: 'REDUX Agro', parent: 'REDUX' },
  { title: 'REDUX Energy', parent: 'REDUX' },
  { title: 'BTEM 2022', parent: 'BTEM 2021' },
  { title: 'BTEM Training 2023', parent: 'BTEM 2021' },
  { title: 'StartUp Training', parent: 'BTEM 2021' },
  { title: 'B-Challenge 2020 · INC Challenges', parent: 'INCmty B-Challenge 2021' }
];

const GRADES = {
  inst: { glyph: '✔', label: 'Institucional' },
  own:  { glyph: '✔', label: 'Propio' },
  none: { glyph: '✖', label: 'Sin artefacto' }
};

/* ── Render helpers ── */
const app = document.getElementById('app');
const navBack = document.getElementById('navBack');
const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

const tally = c => {
  const ok = c.evidenceRows.filter(r => r.grade !== 'none').length;
  return { ok, no: c.evidenceRows.length - ok };
};

function totals() {
  return ORDER.map(s => tally(CASES[s])).reduce(
    (a, t) => ({ ok: a.ok + t.ok, no: a.no + t.no }), { ok: 0, no: 0 }
  );
}

function mediaHTML(c, height) {
  if (!c.banner) {
    const hint = c.voidHint ? `<span class="media-void__hint">${esc(c.voidHint)}</span>` : '';
    return `<div class="media-void"><span>${esc(c.voidLabel || 'Sin imagen publicable')}</span>${hint}</div>`;
  }
  return `
    <div class="card__media">
      <img src="${c.banner}" alt="${esc(c.alt || '')}" loading="lazy" width="1200" height="${height}">
      <img class="card__logo" src="${c.logo}" alt="" aria-hidden="true" loading="lazy" width="40" height="40">
    </div>`;
}

function cardHTML(c, featured) {
  const t = tally(c);
  const caps = c.capacities.map(x => `<span class="cap">${esc(x)}</span>`).join('');
  if (featured) {
    return `
      <a class="card card--featured" href="#/caso/${c.slug}">
        <div class="card__split">
          ${mediaHTML(c, 600)}
          <div class="card__body">
            <span class="meta">${esc(c.org)} · ${esc(c.year)}</span>
            <h3 class="card__title">${esc(c.resultTitle)}</h3>
            <div class="card__caps">${caps}</div>
            <div class="card__scale">${esc(c.scale)}</div>
          </div>
          <div class="card__side">
            <span class="meta">Métrica ancla</span>
            <div class="card__metric">${esc(c.metric)}</div>
            <div class="tally">
              <span class="tally__ok">✔ ${t.ok}</span>
              <span class="tally__no">✖ ${t.no}</span>
              <span class="tally__cta">Ver caso →</span>
            </div>
          </div>
        </div>
      </a>`;
  }
  return `
    <a class="card card--small" href="#/caso/${c.slug}">
      ${mediaHTML(c, 264)}
      <span class="meta">${esc(c.org)} · ${esc(c.year)}</span>
      <h3 class="card__title">${esc(c.resultTitle)}</h3>
      <div class="card__metric">${esc(c.metric)}</div>
      <div class="tally">
        <span class="tally__ok">✔ ${t.ok}</span>
        <span class="tally__no">✖ ${t.no}</span>
        <span class="tally__cta">→</span>
      </div>
    </a>`;
}

function renderHome() {
  const tt = totals();
  const total = tt.ok + tt.no;
  const trust = ['HEINEKEN', 'Tec de Monterrey', 'INCmty', 'FlipHouse', 'HackSureste']
    .map(o => `<div class="trust__chip">${esc(o)}</div>`).join('');

  app.innerHTML = `
    <section class="band hero">
      <div class="wrap">
        <div class="eyebrow">Strategic Program Director</div>
        <h1>Encuentro el mecanismo que frena la ejecución de operaciones complejas, y lo convierto en sistemas medibles que el equipo sostiene.</h1>
        <p>Programas de innovación, arquitecturas RevOps y ecosistemas de emprendimiento en LATAM. Este portafolio no publica lo que no puede probar, y lo dice en cada cifra.</p>
      </div>
    </section>

    <section class="band band--raised counter">
      <div class="wrap">
        <div class="eyebrow">Estado de evidencia · casos insignia</div>
        <div class="counter__grid">
          <div class="counter__cell">
            <div class="counter__num counter__num--total">${total}</div>
            <div class="counter__cap">afirmaciones publicadas</div>
          </div>
          <div class="counter__cell">
            <div class="counter__num counter__num--ok">✔ ${tt.ok}</div>
            <div class="counter__cap">con artefacto verificable</div>
          </div>
          <div class="counter__cell">
            <div class="counter__num counter__num--no">✖ ${tt.no}</div>
            <div class="counter__cap">sin artefacto, declarado y no escondido</div>
          </div>
        </div>
        <p class="counter__note">Ninguna cifra de este portafolio aparece sin su estado de evidencia. Un ✖ no es un error: es la marca que lo distingue de uno que solo publica lo que le conviene.</p>
      </div>
    </section>

    <section class="band trust">
      <div class="wrap">
        <div class="eyebrow eyebrow--plain">Organizaciones</div>
        <div class="trust__row">${trust}</div>
      </div>
    </section>

    <section class="band gallery">
      <div class="wrap">
        <div class="eyebrow">Casos insignia</div>
        <h2>Cuatro casos. Cada uno con su cuenta real de qué se puede probar.</h2>
        ${cardHTML(CASES.heineken, true)}
        <div class="gallery__rest">
          ${['redux', 'hacksureste', 'sofi'].map(s => cardHTML(CASES[s], false)).join('')}
        </div>
      </div>
    </section>

    <section class="band support">
      <div class="wrap">
        <div class="eyebrow eyebrow--plain">Soporte · ${SOPORTE.length} proyectos</div>
        <h2>Programas y convocatorias que completan el registro operativo.</h2>
        <div class="support__list">
          ${SOPORTE.map(s => `
            <div class="support__row">
              <div class="support__title">${esc(s.title)}</div>
              <div class="support__result">${esc(s.result)}</div>
              <div class="support__ev">${esc(s.evidence)}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>

    <section class="archive">
      <div class="wrap">
        <button class="archive__toggle" id="archiveToggle" aria-expanded="false" aria-controls="archiveGrid">
          <span>Archivo · ${ARCHIVE.length} fichas</span>
          <span class="archive__glyph" id="archiveGlyph">+</span>
        </button>
        <p class="archive__note">Existen. No se exhiben. Ediciones y variantes de los casos anteriores, conservadas para trazabilidad.</p>
        <div class="archive__grid" id="archiveGrid" hidden>
          ${ARCHIVE.map(a => `
            <div class="archive__cell">
              <strong>${esc(a.title)}</strong>
              <span>${esc(a.parent)}</span>
            </div>`).join('')}
        </div>
      </div>
    </section>`;

  const btn = document.getElementById('archiveToggle');
  const grid = document.getElementById('archiveGrid');
  const glyph = document.getElementById('archiveGlyph');
  btn.addEventListener('click', () => {
    const open = grid.hasAttribute('hidden');
    grid.toggleAttribute('hidden', !open);
    btn.setAttribute('aria-expanded', String(open));
    glyph.textContent = open ? '−' : '+';
  });

  navBack.hidden = true;
}

function renderCase(slug) {
  const c = CASES[slug];
  const t = tally(c);

  const rows = c.evidenceRows.map(r => {
    const g = GRADES[r.grade];
    const thumb = r.thumb ? `
        <a class="evidence__thumb" href="${r.thumb}" target="_blank" rel="noopener">
          <img src="${r.thumb}" alt="Página del artefacto: ${esc(r.thumbCaption || '')}" loading="lazy" width="1044" height="92">
          <figcaption>Ver artefacto · ${esc(r.thumbCaption || '')}</figcaption>
        </a>` : '';
    return `
      <div class="evidence__row">
        <div class="evidence__claim">${esc(r.claim)}</div>
        <div class="status status--${r.grade}">
          <span class="status__glyph">${g.glyph}</span>
          <span class="status__grade">${g.label}</span>
        </div>
        <div class="evidence__artifact">${r.artifact}${thumb}</div>
      </div>`;
  }).join('');

  const hero = c.banner ? `
    <div class="case-hero">
      <img src="${c.banner}" alt="${esc(c.alt || '')}" width="1600" height="320">
      <img class="case-hero__logo" src="${c.logo}" alt="" aria-hidden="true" width="56" height="56">
    </div>` : '';

  app.innerHTML = `
    ${hero}
    <section class="band case-head">
      <div class="wrap-narrow">
        <div class="meta">${esc(c.org)} · ${esc(c.year)} · ${esc(c.tipo)}</div>
        <h1>${esc(c.resultTitle)}</h1>
        <div class="case-head__tally">
          <span class="tally__ok">✔ ${t.ok}</span>
          <span class="tally__no">✖ ${t.no}</span>
          <span class="meta">afirmaciones en este caso</span>
        </div>
      </div>
    </section>

    <section class="band">
      <div class="wrap-narrow case-two">
        <div>
          <div class="label">Contexto</div>
          <p>${esc(c.contexto)}</p>
        </div>
        <div>
          <div class="label">Problema</div>
          <p>${esc(c.problema)}</p>
        </div>
      </div>
    </section>

    <section class="band band--raised resp">
      <div class="wrap-narrow">
        <div class="eyebrow">Mi responsabilidad</div>
        <h2>${esc(c.role)}</h2>
        <div class="resp__grid">
          <div class="resp__col">
            <div class="resp__head resp__head--era">Era responsable de</div>
            ${c.responsibilityEra.map(i => `<div class="resp__item resp__item--era"><i>✔</i><span>${esc(i)}</span></div>`).join('')}
          </div>
          <div class="resp__col">
            <div class="resp__head resp__head--no">No era responsable de</div>
            ${c.responsibilityNotEra.map(i => `<div class="resp__item resp__item--no"><i>✖</i><span>${esc(i)}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </section>

    <section class="band system">
      <div class="wrap-narrow">
        <div class="label">Sistema construido</div>
        ${c.sistema.map(i => `<div class="system__item"><i>·</i><span>${esc(i)}</span></div>`).join('')}
      </div>
    </section>

    <section class="band band--raised tradeoffs">
      <div class="wrap-narrow">
        <div class="label">Trade-offs</div>
        <p class="prose">${c.tradeoffs}</p>
      </div>
    </section>

    <section class="band results">
      <div class="wrap-narrow">
        <div class="label">Resultados</div>
        <p class="counter__note" style="margin:10px 0 0">${esc(c.resultsNote)}</p>
        <div class="results__grid">
          ${c.resultados.map(r => `<div class="results__cell">${r}</div>`).join('')}
        </div>
      </div>
    </section>

    <section class="band evidence">
      <div class="wrap-narrow">
        <div class="eyebrow">Evidencia</div>
        <h2>Cada afirmación de este caso, con su artefacto o su ausencia.</h2>
        <p class="evidence__sub">${t.ok} con artefacto · ${t.no} sin artefacto</p>
        <div class="evidence__table">
          <div class="evidence__head"><div>Afirmación</div><div>Estado</div><div>Artefacto</div></div>
          ${rows}
        </div>
        <p class="legend">
          <b>Institucional:</b> lo publica un tercero (Informe Anual del Tec, prensa, Talent Land).<br>
          <b>Propio:</b> documentación mía. Prueba que el evento ocurrió y que produje el material, no que la cifra sea correcta.<br>
          <b>Sin artefacto:</b> la afirmación se sostiene sola. La fila se muestra igual.
        </p>
      </div>
    </section>

    <section class="band autopsy">
      <div class="wrap-narrow">
        <div class="label">Lo que haría distinto</div>
        <p class="prose">${esc(c.autopsia)}</p>
      </div>
    </section>

    ${c.archiveChildren.length ? `
    <section class="case-archive">
      <div class="wrap-narrow">
        <div class="eyebrow eyebrow--plain">Archivo de este caso</div>
        <div class="case-archive__row">
          ${c.archiveChildren.map(a => `<span class="case-archive__chip">${esc(a)}</span>`).join('')}
        </div>
      </div>
    </section>` : '<div style="padding:0 0 96px"></div>'}`;

  navBack.hidden = false;
}

function route() {
  const m = (window.location.hash || '').match(/^#\/caso\/([a-z]+)/);
  if (m && CASES[m[1]]) renderCase(m[1]);
  else renderHome();
  window.scrollTo(0, 0);
}

document.querySelectorAll('[data-home]').forEach(el => {
  el.addEventListener('click', e => { e.preventDefault(); window.location.hash = '#/'; });
});
window.addEventListener('hashchange', route);
route();
</script>

</body>
</html>
