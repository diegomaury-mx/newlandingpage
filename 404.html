<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <title>Página no encontrada · Diego Maury</title>
  <link rel="icon" type="image/png" href="/assets/img/isotipo-gradient.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0612;
      color: #F5F5F7;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 34rem; }
    .code {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: clamp(4rem, 15vw, 7rem);
      font-weight: 500;
      color: #FF5C39;
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: rgba(245, 245, 247, 0.65);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block;
      padding: 0.85rem 1.75rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 150ms ease, opacity 150ms ease;
    }
    a.btn:hover, a.btn:focus-visible { transform: translateY(-2px); }
    a.btn:focus-visible { outline: 2px solid #FF5C39; outline-offset: 3px; }
    .btn--primary { background: #FF5C39; color: #0A0612; }
    .btn--ghost { border: 1px solid rgba(245, 245, 247, 0.25); color: #F5F5F7; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code" aria-hidden="true">404</div>
    <h1>Esta página no existe</h1>
    <p>La URL que buscas no está en el sitio. Puede que el enlace sea viejo o que la página se haya movido.</p>
    <div class="links">
      <a class="btn btn--primary" href="/">Ir al inicio</a>
      <a class="btn btn--ghost" href="/portfolio/">Ver portafolio</a>
    </div>
  </main>
</body>
</html>
