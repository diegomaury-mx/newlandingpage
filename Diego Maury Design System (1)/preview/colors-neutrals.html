<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:20px; font-family:var(--font-body); }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.4); margin-bottom:10px; }
  .row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:12px; }
  .swatch { border-radius:8px; overflow:hidden; }
  .chip { height:64px; }
  .meta { padding:8px 10px 10px; background:rgba(255,255,255,0.04); }
  .name { font-family:var(--font-display); font-weight:700; font-size:11px; color:#F5F5F7; letter-spacing:-0.01em; }
  .hex  { font-family:var(--font-mono); font-size:9px; color:rgba(245,245,247,0.45); margin-top:2px; }
  .alpha-row { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .a-chip { height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:8px; color:rgba(245,245,247,0.7); letter-spacing:0.06em; border:1px solid rgba(255,255,255,0.06); }
</style>
</head>
<body>
  <div class="label">Colors · Neutrals · Fondos · Texto</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#120D1A;border:1px solid rgba(255,255,255,0.08)"></div><div class="meta"><div class="name">Midnight Void</div><div class="hex">#120D1A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0F0A1A"></div><div class="meta"><div class="name">Deep Ink</div><div class="hex">#0F0A1A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#B1B5C0"></div><div class="meta"><div class="name">Ghostly Grey</div><div class="hex">#B1B5C0</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F5F5F7"></div><div class="meta"><div class="name" style="color:#120D1A">Stellar Bone</div><div class="hex" style="color:#120D1A">#F5F5F7</div></div></div>
    <div class="swatch"><div class="chip" style="background:#FAF8FC"></div><div class="meta"><div class="name" style="color:#120D1A">Off-White</div><div class="hex" style="color:#120D1A">#FAF8FC</div></div></div>
  </div>
  <div class="label" style="margin-top:4px">Alphas — sobre fondos oscuros</div>
  <div class="alpha-row">
    <div class="a-chip" style="background:rgba(255,255,255,0.90)"><span style="color:#120D1A">90</span></div>
    <div class="a-chip" style="background:rgba(255,255,255,0.60)"><span style="color:#120D1A">60</span></div>
    <div class="a-chip" style="background:rgba(255,255,255,0.40)">40</div>
    <div class="a-chip" style="background:rgba(255,255,255,0.20)">20</div>
    <div class="a-chip" style="background:rgba(255,255,255,0.10)">10</div>
    <div class="a-chip" style="background:rgba(255,255,255,0.06)">06</div>
  </div>
</body>
</html>
