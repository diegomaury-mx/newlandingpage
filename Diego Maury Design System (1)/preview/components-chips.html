<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Chips & Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:22px; }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.4); margin-bottom:10px; margin-top:18px; }
  .label:first-child { margin-top:0; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .pill { font-family:var(--font-mono); font-size:10px; letter-spacing:0.10em; text-transform:uppercase; padding:6px 12px; border-radius:999px; }
</style>
</head>
<body>
  <div class="label">Badges del sistema</div>
  <div class="row">
    <span class="dm-badge dm-badge-amethyst">Innovación</span>
    <span class="dm-badge dm-badge-ember">Acción</span>
    <span class="dm-badge dm-badge-quantum">Activo</span>
    <span class="dm-badge dm-badge-amethyst dm-badge-status">En progreso</span>
    <span class="dm-badge dm-badge-ember dm-badge-status">Urgente</span>
    <span class="dm-badge dm-badge-quantum dm-badge-status">Online</span>
  </div>
  <div class="label">Chips · Pills</div>
  <div class="row">
    <span class="pill" style="background:rgba(124,63,190,0.15);color:#7C3FBE">Programa</span>
    <span class="pill" style="background:rgba(124,63,190,0.15);color:#7C3FBE">LATAM</span>
    <span class="pill" style="background:rgba(255,255,255,0.06);color:rgba(245,245,247,0.7)">Heineken</span>
    <span class="pill" style="background:rgba(255,255,255,0.06);color:rgba(245,245,247,0.7)">Startups</span>
    <span class="pill" style="background:rgba(255,92,57,0.12);color:#FF5C39">Destacado</span>
  </div>
  <div class="label" style="margin-top:16px;">Skill tags</div>
  <div class="row">
    <span class="pill" style="background:#2E1547;color:rgba(245,245,247,0.8);border:1px solid rgba(124,63,190,0.25)">Agile</span>
    <span class="pill" style="background:#2E1547;color:rgba(245,245,247,0.8);border:1px solid rgba(124,63,190,0.25)">OKRs</span>
    <span class="pill" style="background:#2E1547;color:rgba(245,245,247,0.8);border:1px solid rgba(124,63,190,0.25)">Design Thinking</span>
    <span class="pill" style="background:#2E1547;color:rgba(245,245,247,0.8);border:1px solid rgba(124,63,190,0.25)">Innovation</span>
  </div>
</body>
</html>
