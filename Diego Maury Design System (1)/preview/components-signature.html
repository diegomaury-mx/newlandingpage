<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Signature</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:24px; }
  .sig { display:inline-flex; flex-direction:column; gap:4px; }
  .name { font-family:var(--font-display); font-weight:800; font-size:22px; letter-spacing:-0.02em; color:#F5F5F7; }
  .title { font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.5); }
  .tagline { font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#FF5C39; margin-top:4px; }
  .divider { height:1px; background:linear-gradient(90deg,#7C3FBE,#4B2672,#FF5C39); margin:14px 0; width:200px; }
  .url { font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; color:#246BFD; }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.3); margin-top:20px; margin-bottom:8px; }
  .sig-compact { display:flex; align-items:center; gap:12px; }
  .dot-v { width:8px; height:36px; background:linear-gradient(180deg,#7C3FBE,#FF5C39); border-radius:4px; }
  .compact-name { font-family:var(--font-display); font-weight:800; font-size:16px; letter-spacing:-0.015em; color:#F5F5F7; }
  .compact-title { font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(245,245,247,0.45); margin-top:2px; }
</style>
</head>
<body>
  <div class="sig">
    <div class="name">Diego Maury</div>
    <div class="title">Strategic Program &amp; Innovation Manager</div>
    <div class="tagline">HAGAMOS QUE LAS COSAS PASEN</div>
    <div class="divider"></div>
    <div class="url">diegomaury.mx</div>
  </div>
  <div class="label">Variante compacta</div>
  <div class="sig-compact">
    <div class="dot-v"></div>
    <div>
      <div class="compact-name">Diego Maury</div>
      <div class="compact-title">Strategic Program &amp; Innovation Manager</div>
    </div>
  </div>
</body>
</html>
