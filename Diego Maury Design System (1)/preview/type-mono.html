<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:24px; color:#F5F5F7; }
  .tag  { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#7C3FBE; margin-bottom:16px; }
  .tagline { font-family:var(--font-mono); font-weight:500; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#FF5C39; margin-bottom:14px; }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(245,245,247,0.5); margin-bottom:6px; }
  .kpi  { font-family:var(--font-mono); font-size:32px; font-weight:500; letter-spacing:0.04em; color:#7C3FBE; font-variant-numeric:tabular-nums; }
  .id   { font-family:var(--font-mono); font-size:11px; letter-spacing:0.10em; color:rgba(245,245,247,0.4); margin-top:10px; }
  .meta { font-family:var(--font-mono); font-size:9px; letter-spacing:0.06em; color:rgba(245,245,247,0.25); margin-top:14px; }
  .row  { display:flex; gap:28px; align-items:flex-end; }
</style>
</head>
<body>
  <div class="tag">JetBrains Mono · Data · Labels</div>
  <div class="tagline">HAGAMOS QUE LAS COSAS PASEN</div>
  <div class="row">
    <div><div class="label">Impacto Heineken</div><div class="kpi">+600%</div></div>
    <div><div class="label">Emprendedores</div><div class="kpi">3,000+</div></div>
    <div><div class="label">Programas</div><div class="kpi">30+</div></div>
  </div>
  <div class="id">Program ID: DM-2024-HNK-001 · Q3 2024 · LATAM</div>
  <div class="meta">JetBrains Mono 500 · Tagline: 13px, tracking 0.18em · KPI: 32px · ID: 11px, tracking 0.10em</div>
</body>
</html>
