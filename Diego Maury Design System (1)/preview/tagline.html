<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Tagline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:24px; display:flex; flex-direction:column; gap:18px; }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.3); }
  .tl-a { font-family:'JetBrains Mono', monospace; font-weight:500; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#FF5C39; }
  .tl-b { font-family:'JetBrains Mono', monospace; font-weight:500; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,92,57,0.6); }
  .tl-c { font-family:'Satoshi', sans-serif; font-weight:800; font-size:28px; letter-spacing:-0.02em; color:#F5F5F7; }
  .tl-c span { color:#FF5C39; }
  .bar { height:2px; background:linear-gradient(90deg,#7C3FBE,#4B2672,#FF5C39); width:200px; border-radius:1px; }
</style>
</head>
<body>
  <div>
    <div class="label">Tagline principal · JetBrains Mono · Ember</div>
    <div class="tl-a">HAGAMOS QUE LAS COSAS PASEN</div>
  </div>
  <div>
    <div class="label">Tagline muted · subheader use</div>
    <div class="tl-b">HAGAMOS QUE LAS COSAS PASEN</div>
  </div>
  <div>
    <div class="label">Tagline en headline display · Ember spark</div>
    <div class="tl-c">Hagamos que las <span>cosas</span> pasen.</div>
  </div>
  <div class="bar"></div>
</body>
</html>
