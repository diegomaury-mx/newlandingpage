<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Metrics</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:22px; }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.4); margin-bottom:14px; }
  .row { display:flex; gap:28px; flex-wrap:wrap; }
  .metric { display:flex; flex-direction:column; }
  .n { font-family:var(--font-display); font-weight:800; font-size:48px; letter-spacing:-0.03em; line-height:1; color:#7C3FBE; }
  .n.gold { color:#E6B800; }
  .u { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(245,245,247,0.45); margin-top:6px; }
  .d { font-family:var(--font-body); font-size:12px; color:#B1B5C0; margin-top:2px; }
  .divider { width:1px; background:rgba(255,255,255,0.08); }
</style>
</head>
<body>
  <div class="label">Metrics · KPI Display · Amethyst + Spark Gold</div>
  <div class="row">
    <div class="metric"><div class="n gold">+600%</div><div class="u">Adopción</div><div class="d">Heineken Innovation</div></div>
    <div class="divider"></div>
    <div class="metric"><div class="n">3,000+</div><div class="u">Emprendedores</div><div class="d">Formados en LATAM</div></div>
    <div class="divider"></div>
    <div class="metric"><div class="n">30+</div><div class="u">Programas</div><div class="d">Implementados</div></div>
    <div class="divider"></div>
    <div class="metric"><div class="n gold">900+</div><div class="u">Proyectos</div><div class="d">Evaluados</div></div>
  </div>
</body>
</html>
