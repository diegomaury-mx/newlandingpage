<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Logo Lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:20px; }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.4); margin-bottom:10px; margin-top:18px; }
  .label:first-child { margin-top:0; }
  .lockup { padding:20px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
</style>
</head>
<body>
  <div class="label">Logo · Dark background (principal)</div>
  <div class="row">
    <div class="lockup" style="background:#0F0A1A;border:1px solid rgba(255,255,255,0.06)">
      <img src="../assets/logo-principal.png" style="height:48px;display:block;" alt="Logo principal">
    </div>
    <div class="lockup" style="background:#0F0A1A;border:1px solid rgba(255,255,255,0.06)">
      <img src="../assets/logo-horizontal.png" style="height:40px;display:block;" alt="Logo horizontal">
    </div>
  </div>
  <div class="label">Logo · Con tagline</div>
  <div class="row">
    <div class="lockup" style="background:#0F0A1A;border:1px solid rgba(255,255,255,0.06)">
      <img src="../assets/logo-tagline.png" style="height:56px;display:block;" alt="Logo con tagline">
    </div>
  </div>
  <div class="label">Logo · Fondo claro</div>
  <div class="row">
    <div class="lockup" style="background:#FAF8FC;border:1px solid rgba(15,10,26,0.08)">
      <img src="../assets/logo-alt.png" style="height:48px;display:block;" alt="Logo alt">
    </div>
  </div>
</body>
</html>
